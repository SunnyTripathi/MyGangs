<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MyGangs">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>MyGangs</title>

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        :root {
            --bg: #000; --card: #1c1c1e; --card2: #2c2c2e; --card3: #3a3a3c;
            --gold: #FFC000; --red: #ff453a; --green: #32d74b;
            --text: #ffffff; --sub: #8e8e93;
            --safe-top: env(safe-area-inset-top, 44px);
            --safe-bot: env(safe-area-inset-bottom, 34px);
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
        @keyframes goldShine { 0%{background-position:-200% center}100%{background-position:200% center} }
        @keyframes ripple { to{transform:scale(2.5);opacity:0} }
        html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',sans-serif;-webkit-font-smoothing:antialiased;}
        .app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);padding-bottom:var(--safe-bot);animation:fadeUp .5s ease both;}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px 0;}
        .app-name{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(90deg,#FFC000,#fff8dc,#FFC000);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:goldShine 3s linear infinite;}
        .badge{font-size:11px;color:var(--sub);letter-spacing:.5px;}
        .card{flex:1;margin:14px 16px;background:var(--card);border-radius:32px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7);}
        .timer-section{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;}
        .status-label{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:10px;transition:color .4s;}
        .status-label.active{color:var(--gold);} .status-label.done{color:var(--green);}
        #timeLeft{font-size:clamp(52px,15vw,68px);font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-2px;color:var(--red);transition:color .4s;line-height:1;margin:8px 0 20px;}
        #timeLeft.over{color:var(--green);} #timeLeft.idle{color:var(--sub);}
        .ring-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:.15;}
        #progress-ring{transform:rotate(-90deg);}
        #ring-circle{fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round;stroke-dasharray:565.5;stroke-dashoffset:565.5;transition:stroke-dashoffset 1s linear;}
        .bar-area{padding:0 24px 16px;}
        .bar-row{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:8px;font-weight:500;}
        .bar-bg{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;}
        #bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#c89000,var(--gold),#ffe680);border-radius:6px;transition:width 1s linear;}
        .goals-row{display:flex;gap:10px;padding:0 16px 16px;}
        .goal-pill{flex:1;background:var(--card2);border-radius:18px;padding:12px 14px;display:flex;flex-direction:column;gap:3px;}
        .goal-pill label{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:1px;text-transform:uppercase;}
        .goal-pill span{font-size:17px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;}
        .goal-pill .dot{width:6px;height:6px;border-radius:50%;margin-top:4px;}
        .dot-half{background:var(--gold);} .dot-full{background:var(--green);}
        .divider{height:1px;background:var(--card2);margin:0 16px;}
        .controls{padding:16px;display:flex;flex-direction:column;gap:12px;}
        .time-input-wrap{position:relative;}
        .time-input-label{position:absolute;top:10px;left:16px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);pointer-events:none;}
        input[type="time"]{width:100%;background:var(--card2);color:white;border:1.5px solid transparent;padding:32px 16px 12px;border-radius:16px;font-size:20px;font-weight:600;-webkit-appearance:none;outline:none;transition:border-color .2s;font-variant-numeric:tabular-nums;color-scheme:dark;}
        input[type="time"]:focus{border-color:var(--gold);}
        input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(1);}
        .btns{display:flex;gap:10px;}
        button{flex:1;padding:16px;border-radius:16px;border:none;font-weight:700;font-size:16px;letter-spacing:.3px;cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;transition:transform .1s,opacity .1s;}
        button:active{transform:scale(.96);opacity:.85;}
        .btn-start{background:linear-gradient(135deg,#c89000,var(--gold));color:#000;box-shadow:0 4px 20px rgba(255,192,0,.35);}
        .btn-start.running{background:linear-gradient(135deg,#1a4020,#1e5c28);color:var(--green);box-shadow:0 4px 20px rgba(50,215,75,.2);}
        .btn-reset{background:var(--card3);color:white;}
        .ripple-el{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);width:60px;height:60px;margin-top:-30px;margin-left:-30px;animation:ripple .6s ease-out forwards;pointer-events:none;}
        .bottom-nav{display:flex;justify-content:space-around;padding:10px 16px calc(var(--safe-bot) + 4px);background:var(--bg);}
        .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--sub);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:8px;border-radius:12px;cursor:pointer;transition:color .2s;}
        .nav-btn .nav-icon{font-size:20px;}
        .nav-btn.active{color:var(--gold);}
        #history-screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
        .history-card{flex:1;margin:14px 16px 0;background:var(--card);border-radius:32px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7);}
        .history-header{padding:20px 20px 12px;border-bottom:1px solid var(--card2);}
        .history-title{font-size:18px;font-weight:700;color:var(--text);}
        .history-sub{font-size:11px;color:var(--sub);margin-top:2px;}
        .history-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;}
        .history-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--sub);font-size:13px;gap:8px;}
        .history-empty .empty-icon{font-size:40px;opacity:.4;}
        .day-row{background:var(--card2);border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
        .day-date{display:flex;flex-direction:column;align-items:center;min-width:36px;}
        .day-date .dd{font-size:20px;font-weight:800;color:var(--gold);line-height:1;}
        .day-date .dmon{font-size:9px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;}
        .day-sep{width:1px;height:36px;background:var(--card3);}
        .day-info{flex:1;}
        .day-times{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
        .day-worked{font-size:11px;color:var(--sub);}
        .day-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.5px;}
        .day-badge.full{background:rgba(50,215,75,.15);color:var(--green);}
        .day-badge.half{background:rgba(255,192,0,.15);color:var(--gold);}
        .day-badge.partial{background:rgba(255,69,58,.12);color:var(--red);}
        #install-banner{position:fixed;bottom:calc(var(--safe-bot) + 10px);left:16px;right:16px;background:var(--card);border:1px solid var(--card3);border-radius:20px;padding:14px 18px;display:none;align-items:center;gap:12px;box-shadow:0 10px 40px rgba(0,0,0,.8);z-index:99;}
        #install-banner .icon{width:44px;height:44px;background:var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
        #install-banner .text{flex:1;}
        #install-banner .text b{display:block;font-size:14px;}
        #install-banner .text small{color:var(--sub);font-size:12px;}
        #install-banner button{flex:none;background:var(--gold);color:#000;padding:10px 18px;font-size:14px;border-radius:12px;}
        #dismiss-banner{background:transparent!important;color:var(--sub)!important;box-shadow:none!important;padding:10px 8px!important;font-size:20px!important;}
    </style>
</head>
<body>
<div class="app">
    <div class="topbar">
        <span class="app-name">⚡ MyGangs</span>
        <span class="badge">SUNNY'S</span>
    </div>

    <div id="main-screen" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
        <div class="card">
            <div class="timer-section">
                <div class="ring-wrap">
                    <svg id="progress-ring" width="200" height="200" viewBox="0 0 200 200">
                        <circle id="ring-circle" cx="100" cy="100" r="90"/>
                    </svg>
                </div>
                <div class="status-label" id="statusLabel">WAITING TO START</div>
                <div id="timeLeft" class="idle">00:00:00</div>
                <div id="elapsed-label" style="font-size:11px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-top:-12px;margin-bottom:8px;"></div>
            </div>
            <div class="bar-area">
                <div class="bar-row"><span>Progress</span><span id="pct">0%</span></div>
                <div class="bar-bg"><div id="bar-fill"></div></div>
            </div>
            <div class="goals-row">
                <div class="goal-pill"><label>Half Day</label><span id="h">--:--</span><div class="dot dot-half"></div></div>
                <div class="goal-pill"><label>Full Day</label><span id="f">--:--</span><div class="dot dot-full"></div></div>
            </div>
            <div class="divider"></div>
            <div class="controls">
                <div class="time-input-wrap">
                    <div class="time-input-label">Check-in Time</div>
                    <input type="time" id="tIn">
                </div>
                <div class="btns">
                    <button class="btn-start" id="startBtn" onclick="begin(event)">▶ START</button>
                    <button class="btn-reset" onclick="exitApp(event)">👋 CHECK OUT</button>
                </div>
            </div>
        </div>
    </div>

    <div id="history-screen">
        <div class="history-card">
            <div class="history-header">
                <div class="history-title">📅 Attendance History</div>
                <div class="history-sub">Last 30 days</div>
            </div>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" id="nav-timer" onclick="showTab('timer')">
            <span class="nav-icon">⏱</span>Timer
        </button>
        <button class="nav-btn" id="nav-history" onclick="showTab('history')">
            <span class="nav-icon">📅</span>History
        </button>
    </div>
</div>

<div id="install-banner">
    <div class="icon">⚡</div>
    <div class="text"><b>Add to Home Screen</b><small>Use MyGangs like a native app</small></div>
    <button id="install-btn">Install</button>
    <button id="dismiss-banner">✕</button>
</div>

<script>
function save(k,v){try{localStorage.setItem(k,v);}catch(e){}const exp=new Date(Date.now()+30*864e5).toUTCString();document.cookie=k+'='+encodeURIComponent(v)+';expires='+exp+';path=/';}
function load(k){try{const v=localStorage.getItem(k);if(v!==null)return v;}catch(e){}const m=document.cookie.match('(?:^|; )'+k+'=([^;]*)');return m?decodeURIComponent(m[1]):null;}
function removeKey(k){try{localStorage.removeItem(k);}catch(e){}document.cookie=k+'=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';}

function loadHistory(){try{return JSON.parse(localStorage.getItem('mg_history')||'[]');}catch(e){return[];}}
function saveHistory(h){try{localStorage.setItem('mg_history',JSON.stringify(h));}catch(e){}}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function recordCheckin(t){let h=loadHistory();const k=todayKey();h=h.filter(r=>r.date!==k);h.unshift({date:k,checkin:t,checkout:null});h=h.slice(0,30);saveHistory(h);}
function recordCheckout(){let h=loadHistory();const k=todayKey();const r=h.find(r=>r.date===k);if(r){const n=new Date();r.checkout=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}saveHistory(h);}

function renderHistory(){
    const list=document.getElementById('history-list');
    const h=loadHistory();
    if(!h.length){list.innerHTML='<div class="history-empty"><div class="empty-icon">📋</div><span>No history yet</span><span style="font-size:10px;opacity:.6">Start tracking to see your days here</span></div>';return;}
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    list.innerHTML=h.map(rec=>{
        const d=new Date(rec.date+'T00:00:00');
        const cin=fmtTime(rec.checkin);
        const cout=rec.checkout?fmtTime(rec.checkout):'Active...';
        let worked='',badge='',bc='partial';
        if(rec.checkout){
            const[ih,im]=rec.checkin.split(':').map(Number);
            const[oh,om]=rec.checkout.split(':').map(Number);
            const mins=(oh*60+om)-(ih*60+im);
            const wh=Math.floor(mins/60),wm=mins%60;
            worked=wh+'h '+wm+'m worked';
            if(mins>=540){badge='Full Day ✓';bc='full';}
            else if(mins>=270){badge='Half Day';bc='half';}
            else{badge=wh+'h '+wm+'m';bc='partial';}
        }else{badge='Ongoing';bc='half';worked='Still tracking...';}
        return `<div class="day-row">
            <div class="day-date"><div class="dd">${d.getDate()}</div><div class="dmon">${months[d.getMonth()]}</div></div>
            <div class="day-sep"></div>
            <div class="day-info"><div class="day-times">${days[d.getDay()]} · ${cin} → ${cout}</div><div class="day-worked">${worked}</div></div>
            <div class="day-badge ${bc}">${badge}</div>
        </div>`;
    }).join('');
}

function fmtTime(t){if(!t)return'--:--';const[h,m]=t.split(':').map(Number);return fmt(h,m);}

function showTab(tab){
    const main=document.getElementById('main-screen');
    const hist=document.getElementById('history-screen');
    const nt=document.getElementById('nav-timer');
    const nh=document.getElementById('nav-history');
    if(tab==='timer'){main.style.display='flex';hist.style.display='none';nt.classList.add('active');nh.classList.remove('active');}
    else{main.style.display='none';hist.style.display='flex';nh.classList.add('active');nt.classList.remove('active');renderHistory();}
}

let loop, running=false;

function begin(e){
    addRipple(e);
    if(navigator.vibrate)navigator.vibrate(10);
    const val=document.getElementById('tIn').value;
    if(!val){shakeInput();return;}
    clearInterval(loop);running=true;
    const btn=document.getElementById('startBtn');
    btn.textContent='⏸ RUNNING';btn.classList.add('running');
    save('pIn',val);
    recordCheckin(val);
    const[hh,mm]=val.split(':').map(Number);
    document.getElementById('f').innerText=fmt((hh+9)%24,mm);
    let hM=mm+30,hH=hh+4;if(hM>=60){hM-=60;hH++;}
    document.getElementById('h').innerText=fmt(hH%24,hM);
    const s=document.getElementById('statusLabel');
    s.textContent='TIME REMAINING';s.className='status-label active';
    loop=setInterval(tick,1000);tick();
}

function tick(){
    const val=document.getElementById('tIn').value;if(!val)return;
    const[sh,sm]=val.split(':').map(Number);
    const now=new Date();
    const start=new Date();start.setHours(sh,sm,0,0);
    if(start>now)start.setDate(start.getDate()-1);
    const end=new Date(start.getTime()+9*3600000);
    let diff=end-now;const over=diff<0;diff=Math.abs(diff);
    const h=Math.floor(diff/3600000).toString().padStart(2,'0');
    const m=Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
    const s=Math.floor((diff%60000)/1000).toString().padStart(2,'0');
    const elapsed=now-start;
    const eh=Math.floor(Math.max(0,elapsed)/3600000);
    const em=Math.floor((Math.max(0,elapsed)%3600000)/60000);
    const elapsedEl=document.getElementById('elapsed-label');
    if(elapsedEl)elapsedEl.textContent='ELAPSED: '+eh+'h '+em+'m';
    const display=document.getElementById('timeLeft');
    display.innerText=(over?'+':'')+h+':'+m+':'+s;
    display.className=over?'over':'';
    const status=document.getElementById('statusLabel');
    if(over){status.textContent='✓ FULL DAY DONE';status.className='status-label done';}
    let p=((now-start)/32400000)*100;p=Math.max(0,Math.min(p,100));
    document.getElementById('bar-fill').style.width=p+'%';
    document.getElementById('pct').textContent=Math.floor(p)+'%';
    document.getElementById('ring-circle').style.strokeDashoffset=565.5-(565.5*p/100);
}

function fmt(h,m){const p=h>=12?'PM':'AM';h=h%12||12;return h+':'+m.toString().padStart(2,'0')+' '+p;}

function exitApp(e){
    addRipple(e);
    if(!running){alert('No active session.');return;}
    if(confirm('Check out for today?')){
        recordCheckout();
        clearInterval(loop);running=false;removeKey('pIn');
        const s=document.getElementById('statusLabel');
        s.textContent='✓ CHECKED OUT';s.className='status-label done';
        document.getElementById('startBtn').textContent='▶ START';
        document.getElementById('startBtn').classList.remove('running');
        document.getElementById('tIn').value='';
        const el=document.getElementById('elapsed-label');
        if(el)el.textContent='Checkout saved to history';
    }
}

function addRipple(e){
    if(!e)return;const btn=e.currentTarget;
    const r=document.createElement('span');r.className='ripple-el';
    const rect=btn.getBoundingClientRect();
    r.style.left=((e.clientX||rect.left+rect.width/2)-rect.left)+'px';
    r.style.top=((e.clientY||rect.top+rect.height/2)-rect.top)+'px';
    btn.appendChild(r);setTimeout(()=>r.remove(),700);
}

function shakeInput(){
    const el=document.getElementById('tIn');el.style.borderColor='var(--red)';
    let i=0;const iv=setInterval(()=>{
        el.style.transform=i%2===0?'translateX(6px)':'translateX(-6px)';
        if(++i>5){clearInterval(iv);el.style.transform='';el.style.borderColor='';}
    },60);
}

document.addEventListener('visibilitychange',()=>{if(!document.hidden&&running)tick();});
window.addEventListener('focus',()=>{if(running)tick();});

(function(){const s=load('pIn');if(s){document.getElementById('tIn').value=s;begin(null);}})();

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();deferredPrompt=e;
    if(!load('installDismissed'))document.getElementById('install-banner').style.display='flex';
});
document.getElementById('install-btn').addEventListener('click',()=>{
    if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').style.display='none';});}
    else{alert('Tap the Share button (□↑) in Safari → "Add to Home Screen" → "Add".');}
});
document.getElementById('dismiss-banner').addEventListener('click',()=>{
    document.getElementById('install-banner').style.display='none';save('installDismissed','1');
});
setTimeout(()=>{
    const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone=window.navigator.standalone;
    const banner=document.getElementById('install-banner');
    if(isIOS&&!isStandalone&&!load('installDismissed')&&banner.style.display!=='flex'){
        banner.style.display='flex';
        document.getElementById('install-btn').textContent='How?';
    }
},3000);
</script>
</body>
</html>
