<!-- PWA / iOS Meta -->

<title>MyGangs</title>

<!-- Inline Manifest via link -->
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22MyGangs%22%2C%22short_name%22%3A%22MyGangs%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23FFC000%22%2C%22icons%22%3A%5B%5D%7D">

<style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    :root {
        --bg: #000;
        --card: #1c1c1e;
        --card2: #2c2c2e;
        --card3: #3a3a3c;
        --gold: #FFC000;
        --red: #ff453a;
        --green: #32d74b;
        --text: #ffffff;
        --sub: #8e8e93;
        --safe-top: env(safe-area-inset-top, 44px);
        --safe-bot: env(safe-area-inset-bottom, 34px);
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
    }
    @keyframes goldShine {
        0%   { background-position: -200% center; }
        100% { background-position: 200% center; }
    }
    @keyframes ripple {
        to { transform: scale(2.5); opacity: 0; }
    }

    html, body {
        margin: 0; padding: 0;
        height: 100%; width: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, 'SF Pro Display', sans-serif;
        -webkit-font-smoothing: antialiased;
    }

    .app {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding-top: var(--safe-top);
        padding-bottom: var(--safe-bot);
        animation: fadeUp .5s ease both;
    }

    /* ── TOP STATUS BAR ── */
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 24px 0;
    }
    .app-name {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--gold);
        background: linear-gradient(90deg, #FFC000, #fff8dc, #FFC000);
        background-size: 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: goldShine 3s linear infinite;
    }
    .badge {
        font-size: 11px;
        color: var(--sub);
        letter-spacing: .5px;
    }

    /* ── MAIN CARD ── */
    .card {
        flex: 1;
        margin: 14px 16px;
        background: var(--card);
        border-radius: 32px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,.7);
    }

    /* ── TIMER SECTION ── */
    .timer-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
    }

    .status-label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--sub);
        margin-bottom: 10px;
        transition: color .4s;
    }
    .status-label.active { color: var(--gold); }
    .status-label.done   { color: var(--green); }

    #timeLeft {
        font-size: clamp(52px, 15vw, 68px);
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        letter-spacing: -2px;
        color: var(--red);
        transition: color .4s;
        line-height: 1;
        margin: 8px 0 20px;
    }
    #timeLeft.over { color: var(--green); }
    #timeLeft.idle { color: var(--sub); }

    /* Radial progress ring */
    .ring-wrap {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: .15;
    }
    #progress-ring { transform: rotate(-90deg); }
    #ring-circle {
        fill: none;
        stroke: var(--gold);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-dasharray: 565.5;
        stroke-dashoffset: 565.5;
        transition: stroke-dashoffset 1s linear;
    }

    /* ── PROGRESS BAR ── */
    .bar-area { padding: 0 24px 16px; }
    .bar-row {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--sub);
        margin-bottom: 8px;
        font-weight: 500;
    }
    .bar-bg {
        height: 6px;
        background: var(--card2);
        border-radius: 6px;
        overflow: hidden;
    }
    #bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #c89000, var(--gold), #ffe680);
        border-radius: 6px;
        transition: width 1s linear;
    }

    /* ── GOALS ROW ── */
    .goals-row {
        display: flex;
        gap: 10px;
        padding: 0 16px 16px;
    }
    .goal-pill {
        flex: 1;
        background: var(--card2);
        border-radius: 18px;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 3px;
    }
    .goal-pill label {
        font-size: 10px;
        font-weight: 700;
        color: var(--sub);
        letter-spacing: 1px;
        text-transform: uppercase;
    }
    .goal-pill span {
        font-size: 17px;
        font-weight: 700;
        color: var(--text);
        font-variant-numeric: tabular-nums;
    }
    .goal-pill .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        margin-top: 4px;
    }
    .dot-half { background: var(--gold); }
    .dot-full { background: var(--green); }

    /* ── DIVIDER ── */
    .divider {
        height: 1px;
        background: var(--card2);
        margin: 0 16px;
    }

    /* ── BOTTOM CONTROLS ── */
    .controls {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .time-input-wrap {
        position: relative;
    }
    .time-input-label {
        position: absolute;
        top: 10px; left: 16px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--gold);
        pointer-events: none;
    }
    input[type="time"] {
        width: 100%;
        background: var(--card2);
        color: white;
        border: 1.5px solid transparent;
        padding: 32px 16px 12px;
        border-radius: 16px;
        font-size: 20px;
        font-weight: 600;
        -webkit-appearance: none;
        outline: none;
        transition: border-color .2s;
        font-variant-numeric: tabular-nums;
    }
    input[type="time"]:focus {
        border-color: var(--gold);
    }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }

    .btns { display: flex; gap: 10px; }
    button {
        flex: 1;
        padding: 16px;
        border-radius: 16px;
        border: none;
        font-weight: 700;
        font-size: 16px;
        letter-spacing: .3px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        transition: transform .1s, opacity .1s;
    }
    button:active { transform: scale(.96); opacity: .85; }

    .btn-start {
        background: linear-gradient(135deg, #c89000, var(--gold));
        color: #000;
        box-shadow: 0 4px 20px rgba(255,192,0,.35);
    }
    .btn-start.running {
        background: linear-gradient(135deg, #1a4020, #1e5c28);
        color: var(--green);
        box-shadow: 0 4px 20px rgba(50,215,75,.2);
    }
    .btn-reset {
        background: var(--card3);
        color: white;
    }

    /* Ripple effect */
    .ripple-el {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,.3);
        width: 60px; height: 60px;
        margin-top: -30px; margin-left: -30px;
        animation: ripple .6s ease-out forwards;
        pointer-events: none;
    }

    /* ── INSTALL BANNER ── */
    #install-banner {
        position: fixed;
        bottom: calc(var(--safe-bot) + 10px);
        left: 16px; right: 16px;
        background: var(--card);
        border: 1px solid var(--card3);
        border-radius: 20px;
        padding: 14px 18px;
        display: none;
        align-items: center;
        gap: 12px;
        box-shadow: 0 10px 40px rgba(0,0,0,.8);
        animation: fadeUp .4s ease;
        z-index: 99;
    }
    #install-banner .icon {
        width: 44px; height: 44px;
        background: var(--gold);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
    }
    #install-banner .text { flex: 1; }
    #install-banner .text b { display: block; font-size: 14px; }
    #install-banner .text small { color: var(--sub); font-size: 12px; }
    #install-banner button {
        flex: none;
        background: var(--gold);
        color: #000;
        padding: 10px 18px;
        font-size: 14px;
        border-radius: 12px;
    }
    #dismiss-banner {
        background: transparent !important;
        color: var(--sub) !important;
        box-shadow: none !important;
        padding: 10px 8px !important;
        font-size: 20px !important;
    }
</style>

</div>

<!-- INSTALL BANNER -->

<div id="install-banner">
    <div class="icon">⏱</div>
    <div class="text">
        <b>Add to Home Screen</b>
        <small>Use MyGangs like a native app</small>
    </div>
    <button id="install-btn">Install</button>
    <button id="dismiss-banner">✕</button>
</div>

<script>
// ── Storage: cookies + localStorage for persistence ──
function save(k, v) {
    try { localStorage.setItem(k, v); } catch(e) {}
    const exp = new Date(Date.now() + 30 * 864e5).toUTCString();
    document.cookie = k + '=' + encodeURIComponent(v) + ';expires=' + exp + ';path=/';
}
function load(k) {
    try { const v = localStorage.getItem(k); if (v !== null) return v; } catch(e) {}
    const m = document.cookie.match('(?:^|; )' + k + '=([^;]*)');
    return m ? decodeURIComponent(m[1]) : null;
}
function removeKey(k) {
    try { localStorage.removeItem(k); } catch(e) {}
    document.cookie = k + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
}

// ── Generate Apple Touch Icon ──
(function () {
    const c = document.createElement('canvas');
    c.width = c.height = 180;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#1c1c1e';
    ctx.roundRect(0, 0, 180, 180, 36);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(90, 75, 48, 0, Math.PI * 2);
    ctx.strokeStyle = '#FFC000';
    ctx.lineWidth = 7;
    ctx.stroke();
    ctx.fillStyle = '#FFC000';
    ctx.font = 'bold 36px -apple-system';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚡', 90, 75);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px -apple-system';
    ctx.fillText('MyGangs', 90, 145);
    document.getElementById('apple-icon').href = c.toDataURL();
})();

// ── State ──
let loop, running = false;

function begin(e) {
    addRipple(e);
    if (navigator.vibrate) navigator.vibrate(10);

    const timeVal = document.getElementById('tIn').value;
    if (!timeVal) {
        shakeInput();
        return;
    }

    clearInterval(loop);
    running = true;

    const btn = document.getElementById('startBtn');
    btn.textContent = '⏸ RUNNING';
    btn.classList.add('running');

    save('pIn', timeVal);
    localStorage.setItem('pStart', Date.now());

    const [hh, mm] = timeVal.split(':').map(Number);

    // Full Day 9h
    document.getElementById('f').innerText = fmt((hh + 9) % 24, mm);

    // Half Day 4h30m
    let hM = mm + 30, hH = hh + 4;
    if (hM >= 60) { hM -= 60; hH++; }
    document.getElementById('h').innerText = fmt(hH % 24, hM);

    const status = document.getElementById('statusLabel');
    status.textContent = 'TRACKING';
    status.className = 'status-label active';

    loop = setInterval(tick, 1000);
    tick();
}

function tick() {
    const startVal = document.getElementById('tIn').value;
    if (!startVal) return;

    const [sh, sm] = startVal.split(':').map(Number);
    const now = new Date();
    const start = new Date();
    start.setHours(sh, sm, 0, 0);
    const end = new Date(start.getTime() + 9 * 3600000);

    let diff = end - now;
    const over = diff < 0;
    diff = Math.abs(diff);

    const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
    const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
    const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');

    const display = document.getElementById('timeLeft');
    display.innerText = (over ? '+' : '') + h + ':' + m + ':' + s;
    display.className = over ? 'over' : '';

    const status = document.getElementById('statusLabel');
    if (over) {
        status.textContent = '✓ FULL DAY DONE';
        status.className = 'status-label done';
    }

    // Progress
    let p = ((now - start) / 32400000) * 100;
    p = Math.max(0, Math.min(p, 100));
    document.getElementById('bar-fill').style.width = p + '%';
    document.getElementById('pct').textContent = Math.floor(p) + '%';

    // Ring (circumference = 2π×90 ≈ 565.5)
    const offset = 565.5 - (565.5 * p / 100);
    document.getElementById('ring-circle').style.strokeDashoffset = offset;
}

function fmt(h, m) {
    const p = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + m.toString().padStart(2, '0') + ' ' + p;
}

function clr(e) {
    addRipple(e);
    if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
    clearInterval(loop);
    running = false;
    removeKey('pIn');
    removeKey('pStart');
    location.reload();
}

function addRipple(e) {
    if (!e) return;
    const btn = e.currentTarget;
    const r = document.createElement('span');
    r.className = 'ripple-el';
    const rect = btn.getBoundingClientRect();
    r.style.left = ((e.clientX || rect.left + rect.width / 2) - rect.left) + 'px';
    r.style.top  = ((e.clientY || rect.top + rect.height / 2) - rect.top) + 'px';
    btn.appendChild(r);
    setTimeout(() => r.remove(), 700);
}

function shakeInput() {
    const el = document.getElementById('tIn');
    el.style.borderColor = 'var(--red)';
    el.style.animation = 'none';
    let i = 0;
    const shake = setInterval(() => {
        el.style.transform = i % 2 === 0 ? 'translateX(6px)' : 'translateX(-6px)';
        if (++i > 5) { clearInterval(shake); el.style.transform = ''; el.style.borderColor = ''; }
    }, 60);
}

// ── Resume on return from background ──
document.addEventListener('visibilitychange', () => {
    if (!document.hidden && running) tick();
});
window.addEventListener('focus', () => { if (running) tick(); });

// ── Auto-resume ──
(function check() {
    const s = load('pIn');
    if (s) {
        document.getElementById('tIn').value = s;
        begin(null);
    }
})();

// ── PWA Install Banner ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    if (!load('installDismissed')) {
        banner.style.display = 'flex';
    }
});

document.getElementById('install-btn').addEventListener('click', () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
            deferredPrompt = null;
            document.getElementById('install-banner').style.display = 'none';
        });
    } else {
        alert('On iPhone: tap the Share button (□↑) at the bottom of Safari, then "Add to Home Screen" → "Add".');
    }
});

document.getElementById('dismiss-banner').addEventListener('click', () => {
    document.getElementById('install-banner').style.display = 'none';
    save('installDismissed', '1');
});

// Show iOS hint after 3s if no install event fired
setTimeout(() => {
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone;
    const banner = document.getElementById('install-banner');
    if (isIOS && !isStandalone && !load('installDismissed') && banner.style.display !== 'flex') {
        banner.style.display = 'flex';
        document.getElementById('install-btn').textContent = 'How?';
    }
}, 3000);
</script>

</body>
