<style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    :root {
        --bg: #000;
        --card: #1c1c1e;
        --card2: #2c2c2e;
        --card3: #3a3a3c;
        --gold: #FFC000;
        --red: #ff453a;
        --green: #32d74b;
        --text: #ffffff;

        --safe-top: env(safe-area-inset-top, 44px);
        --safe-bot: env(safe-area-inset-bottom, 34px);

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
    }
    @keyframes goldShine {
        0%   { background-position: -200% center; }
        100% { background-position: 200% center; }
    }
    @keyframes ripple {
        to { transform: scale(2.5); opacity: 0; }

    html, body {
        margin: 0; padding: 0;
        height: 100%; width: 100%;
        overflow: hidden;
        background: var(--bg);

        -webkit-font-smoothing: antialiased;

    .app {
        display: flex;

        padding-bottom: var(--safe-bot);
        animation: fadeUp .5s ease both;

    /* ── TOP STATUS BAR ── */
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 24px 0;
    }
    .app-name {
        font-size: 13px;
        font-weight: 700;

        color: var(--gold);
        background: linear-gradient(90deg, #FFC000, #fff8dc, #FFC000);
        background-size: 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: goldShine 3s linear infinite;
    }
    .badge {
        font-size: 11px;
        color: var(--sub);
        letter-spacing: .5px;

    /* ── MAIN CARD ── */
    .card {
        flex: 1;

        flex-direction: column;

    .timer-section {

        align-items: center;

        padding: 24px;

    .status-label {
        font-size: 12px;

        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--sub);
        margin-bottom: 10px;
        transition: color .4s;
    }
    .status-label.active { color: var(--gold); }
    .status-label.done   { color: var(--green); }

    #timeLeft {
        font-size: clamp(52px, 15vw, 68px);
        font-weight: 800;
        font-variant-numeric: tabular-nums;

    #timeLeft.over { color: var(--green); }
    #timeLeft.idle { color: var(--sub); }

    .ring-wrap {

<script>
// ── History (30 days) ──
function loadHistory() {
    try { return JSON.parse(localStorage.getItem('mg_history') || '[]'); } catch(e) { return []; }
}
function saveHistory(h) {
    try { localStorage.setItem('mg_history', JSON.stringify(h)); } catch(e) {}
    const exp = new Date(Date.now() + 30 * 864e5).toUTCString();
    document.cookie = 'mg_history=' + encodeURIComponent(JSON.stringify(h)) + ';expires=' + exp + ';path=/';
}
function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function recordCheckin(timeVal) {
    let h = loadHistory();
    const key = todayKey();
    h = h.filter(r => r.date !== key); // replace today if exists
    h.unshift({ date: key, checkin: timeVal, checkout: null });
    // keep only 30 days
    h = h.slice(0, 30);
    saveHistory(h);
}
function recordCheckout() {
    let h = loadHistory();
    const key = todayKey();
    const rec = h.find(r => r.date === key);
    if (rec) {
        const now = new Date();
        rec.checkout = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    }
    saveHistory(h);
}

function renderHistory() {
    const list = document.getElementById('history-list');
    const h = loadHistory();
    if (!h.length) {
        list.innerHTML = '<div class="history-empty"><div class="empty-icon">📋</div><span>No history yet</span><span style="font-size:10px;opacity:.6">Start tracking to see your days here</span></div>';
        return;
    }
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    list.innerHTML = h.map(rec => {
        const d = new Date(rec.date + 'T00:00:00');
        const dd = d.getDate();
        const mon = months[d.getMonth()];
        const day = days[d.getDay()];
        const cin = fmtTime(rec.checkin);
        const cout = rec.checkout ? fmtTime(rec.checkout) : 'Active...';
        let worked = '', badge = '', badgeClass = 'partial';
        if (rec.checkout) {
            const [ih, im] = rec.checkin.split(':').map(Number);
            const [oh, om] = rec.checkout.split(':').map(Number);
            const mins = (oh * 60 + om) - (ih * 60 + im);
            const wh = Math.floor(mins / 60), wm = mins % 60;
            worked = wh + 'h ' + wm + 'm worked';
            if (mins >= 540) { badge = 'Full Day ✓'; badgeClass = 'full'; }
            else if (mins >= 270) { badge = 'Half Day'; badgeClass = 'half'; }
            else { badge = wh + 'h ' + wm + 'm'; badgeClass = 'partial'; }
        } else {
            badge = 'Ongoing'; badgeClass = 'half';
            worked = 'Still tracking...';
        }
        return `<div class="day-row">
            <div class="day-date"><div class="dd">${dd}</div><div class="dmon">${mon}</div></div>
            <div class="day-sep"></div>
            <div class="day-info">
                <div class="day-times">${day} · ${cin} → ${cout}</div>
                <div class="day-worked">${worked}</div>
            </div>
            <div class="day-badge ${badgeClass}">${badge}</div>
        </div>`;
    }).join('');
}

function fmtTime(t) {
    if (!t) return '--:--';
    const [h, m] = t.split(':').map(Number);
    return fmt(h, m);
}

// ── Tab switching ──
function showTab(tab) {
    const main = document.getElementById('main-screen');
    const hist = document.getElementById('history-screen');
    const nt = document.getElementById('nav-timer');
    const nh = document.getElementById('nav-history');
    if (tab === 'timer') {
        main.style.display = 'flex'; hist.style.display = 'none';
        nt.classList.add('active'); nh.classList.remove('active');
    } else {
        main.style.display = 'none'; hist.style.display = 'flex';
        nh.classList.add('active'); nt.classList.remove('active');
        renderHistory();
    }
}

// ── Storage: cookies + localStorage for persistence ──
function save(k, v) {
    try { localStorage.setItem(k, v); } catch(e) {}
    const exp = new Date(Date.now() + 30 * 864e5).toUTCString();
    document.cookie = k + '=' + encodeURIComponent(v) + ';expires=' + exp + ';path=/';
}
function load(k) {
    try { const v = localStorage.getItem(k); if (v !== null) return v; } catch(e) {}
    const m = document.cookie.match('(?:^|; )' + k + '=([^;]*)');
    return m ? decodeURIComponent(m[1]) : null;
}
function removeKey(k) {
    try { localStorage.removeItem(k); } catch(e) {}
    document.cookie = k + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
}

// ── Generate Apple Touch Icon — modern lightning bolt ──
(function () {
    const c = document.createElement('canvas');
    c.width = c.height = 512;
    const ctx = c.getContext('2d');

    // Background — deep black with rounded corners
    const r = 112;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(512-r, 0);
    ctx.quadraticCurveTo(512, 0, 512, r);
    ctx.lineTo(512, 512-r);
    ctx.quadraticCurveTo(512, 512, 512-r, 512);
    ctx.lineTo(r, 512);
    ctx.quadraticCurveTo(0, 512, 0, 512-r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    const bg = ctx.createLinearGradient(0, 0, 512, 512);
    bg.addColorStop(0, '#1a1a1a');
    bg.addColorStop(1, '#0a0a0a');
    ctx.fillStyle = bg;
    ctx.fill();

    // Subtle glow behind bolt
    const glow = ctx.createRadialGradient(256, 256, 20, 256, 256, 200);
    glow.addColorStop(0, 'rgba(255,192,0,0.18)');
    glow.addColorStop(1, 'rgba(255,192,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, 512, 512);

    // Lightning bolt — clean geometric shape
    ctx.beginPath();
    ctx.moveTo(295, 60);    // top right
    ctx.lineTo(160, 275);   // middle left
    ctx.lineTo(230, 275);   // middle notch
    ctx.lineTo(175, 452);   // bottom left
    ctx.lineTo(360, 220);   // middle right
    ctx.lineTo(285, 220);   // middle notch right
    ctx.lineTo(375, 60);    // top right corner
    ctx.closePath();

    // Gold gradient fill
    const bolt = ctx.createLinearGradient(160, 60, 360, 452);
    bolt.addColorStop(0, '#FFE566');
    bolt.addColorStop(0.5, '#FFC000');
    bolt.addColorStop(1, '#CC9600');
    ctx.fillStyle = bolt;
    ctx.fill();

    // Shine highlight on bolt
    ctx.beginPath();
    ctx.moveTo(295, 60);
    ctx.lineTo(375, 60);
    ctx.lineTo(285, 220);
    ctx.lineTo(360, 220);
    ctx.lineTo(265, 340);
    ctx.lineTo(230, 275);
    ctx.lineTo(160, 275);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fill();

    document.getElementById('apple-icon').href = c.toDataURL();
})();

// ── State ──
let loop, running = false;

function begin(e) {
    addRipple(e);
    if (navigator.vibrate) navigator.vibrate(10);

    const timeVal = document.getElementById('tIn').value;
    if (!timeVal) {
        shakeInput();
        return;
    }

    clearInterval(loop);
    running = true;

    const btn = document.getElementById('startBtn');
    btn.textContent = '⏸ RUNNING';
    btn.classList.add('running');

    save('pIn', timeVal);
    localStorage.setItem('pStart', Date.now());
    recordCheckin(timeVal);

    const [hh, mm] = timeVal.split(':').map(Number);

    // Full Day 9h
    document.getElementById('f').innerText = fmt((hh + 9) % 24, mm);

    // Half Day 4h30m
    let hM = mm + 30, hH = hh + 4;
    if (hM >= 60) { hM -= 60; hH++; }
    document.getElementById('h').innerText = fmt(hH % 24, hM);

    const status = document.getElementById('statusLabel');
    status.textContent = 'TRACKING';
    status.className = 'status-label active';

    loop = setInterval(tick, 1000);
    tick();
}

function tick() {
    const startVal = document.getElementById('tIn').value;
    if (!startVal) return;

    const [sh, sm] = startVal.split(':').map(Number);
    const now = new Date();
    const start = new Date();
    start.setHours(sh, sm, 0, 0);
    const end = new Date(start.getTime() + 9 * 3600000);

    let diff = end - now;
    const over = diff < 0;
    diff = Math.abs(diff);

    const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
    const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
    const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');

    const display = document.getElementById('timeLeft');
    display.innerText = (over ? '+' : '') + h + ':' + m + ':' + s;
    display.className = over ? 'over' : '';

    const status = document.getElementById('statusLabel');
    if (over) {
        status.textContent = '✓ FULL DAY DONE';
        status.className = 'status-label done';
    }

    // Progress
    let p = ((now - start) / 32400000) * 100;
    p = Math.max(0, Math.min(p, 100));
    document.getElementById('bar-fill').style.width = p + '%';
    document.getElementById('pct').textContent = Math.floor(p) + '%';

    // Ring (circumference = 2π×90 ≈ 565.5)
    const offset = 565.5 - (565.5 * p / 100);
    document.getElementById('ring-circle').style.strokeDashoffset = offset;
}

function fmt(h, m) {
    const p = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + m.toString().padStart(2, '0') + ' ' + p;
}

function clr(e) {
    addRipple(e);
    if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
    recordCheckout();
    clearInterval(loop);
    running = false;
    removeKey('pIn');
    removeKey('pStart');
    location.reload();
}

function addRipple(e) {
    if (!e) return;
    const btn = e.currentTarget;
    const r = document.createElement('span');
    r.className = 'ripple-el';
    const rect = btn.getBoundingClientRect();
    r.style.left = ((e.clientX || rect.left + rect.width / 2) - rect.left) + 'px';
    r.style.top  = ((e.clientY || rect.top + rect.height / 2) - rect.top) + 'px';
    btn.appendChild(r);
    setTimeout(() => r.remove(), 700);
}

function shakeInput() {
    const el = document.getElementById('tIn');
    el.style.borderColor = 'var(--red)';
    el.style.animation = 'none';
    let i = 0;
    const shake = setInterval(() => {
        el.style.transform = i % 2 === 0 ? 'translateX(6px)' : 'translateX(-6px)';
        if (++i > 5) { clearInterval(shake); el.style.transform = ''; el.style.borderColor = ''; }
    }, 60);
}

// ── Resume on return from background ──
document.addEventListener('visibilitychange', () => {
    if (!document.hidden && running) tick();
});
window.addEventListener('focus', () => { if (running) tick(); });

// ── Auto-resume ──
(function check() {
    const s = load('pIn');
    if (s) {
        document.getElementById('tIn').value = s;
        begin(null);
    }
})();

// ── PWA Install Banner ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    if (!load('installDismissed')) {
        banner.style.display = 'flex';
    }
});

document.getElementById('install-btn').addEventListener('click', () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
            deferredPrompt = null;
            document.getElementById('install-banner').style.display = 'none';
        });
    } else {
        alert('On iPhone: tap the Share button (□↑) at the bottom of Safari, then "Add to Home Screen" → "Add".');
    }
});

document.getElementById('dismiss-banner').addEventListener('click', () => {
    document.getElementById('install-banner').style.display = 'none';
    save('installDismissed', '1');
});

// Show iOS hint after 3s if no install event fired
setTimeout(() => {
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone;
    const banner = document.getElementById('install-banner');
    if (isIOS && !isStandalone && !load('installDismissed') && banner.style.display !== 'flex') {
        banner.style.display = 'flex';
        document.getElementById('install-btn').textContent = 'How?';
    }
}, 3000);
</script>
